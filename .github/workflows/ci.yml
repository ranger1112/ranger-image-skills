name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile CLI entrypoint
        run: python -m py_compile skills/ranger-image-2/scripts/generate_image.py
      - name: Compile ranger image library
        run: python -m compileall -q skills/ranger-image-2/scripts/ranger_image_lib
      - name: Run unit tests
        run: python -m unittest discover -s tests
